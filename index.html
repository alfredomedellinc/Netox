<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netox Check</title>
    <style>
        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212; /* Fondo oscuro para más estilo */
            color: white;
        }

        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 4rem;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
            border: 2px solid #333;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        button {
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: 900;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
        }

        .btn-si {
            background-color: #ffffff;
            color: #000;
        }

        .btn-no {
            background-color: #333;
            color: #fff;
        }

        button:hover {
            transform: scale(1.15);
            box-shadow: 0 0 30px rgba(255,255,255,0.4);
        }

        button:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¿ERES NETOX?</h1>
        <div class="buttons">
            <button class="btn-si" onclick="playMeme()">SÍ</button>
            <button class="btn-no" onclick="alert('Intento de escape fallido')">NO</button>
        </div>
    </div>

    <audio id="memeAudio">
        <source src="WHO TF IS GIGA N_GGA _ Sound Effect.mp3" type="audio/mpeg">
    </audio>

    <script>
        function playMeme() {
            const audio = document.getElementById("memeAudio");
            audio.currentTime = 0; // Reinicia el audio si se presiona varias veces
            audio.play().catch(e => {
                console.error("Error al reproducir:", e);
                alert("¡Sube el volumen!");
            });
        }
    </script>

</body>
</html>
